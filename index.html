<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Rex Ahuatepec - Contacto</title>
    <style>
        /* Fondo y centrado vertical */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f0f2f5; 
            margin: 0; 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Tarjeta Blanca */
        .container { 
            max-width: 380px; 
            width: 100%;
            background: white; 
            padding: 40px 25px; 
            border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            box-sizing: border-box;
        }

        /* Logo al 150% de tamaño y centrado */
        img { 
            width: 180px; 
            height: auto; 
            margin-bottom: 30px; 
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 22px;
            font-weight: 600;
        }

        /* Botones Rectangulares Centrados */
        .btn { 
            display: block; 
            width: 90%; /* Ancho uniforme */
            margin: 15px auto; /* Centrado automático de los rectángulos */
            padding: 16px 0; 
            border: none; 
            border-radius: 12px; 
            color: white; 
            text-decoration: none; 
            font-weight: bold; 
            font-size: 17px; 
            transition: transform 0.2s ease;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.97);
        }

        /* Colores de marca */
        .fb { background-color: #1877F2; }
        .gm { background-color: #4285F4; }

    </style>
</head>
<body>

    <div class="container">
        <img src="https://raw.githubusercontent.com/surexvilla/utilidades/refs/heads/main/rex%20ahuatepec.png" alt="Logo Super Rex Ahuatepec">
        
        <h2>¡Gracias por tu visita!</h2>
        
        <a href="https://www.facebook.com/SuperRexAhuatepec/" target="_blank" class="btn fb">Visítanos en Facebook</a>
        
        <a href="https://g.page/r/CRa7AVL3vgJNEBM/review" target="_blank" class="btn gm">Califícanos en Google</a>
    </div>

</body>
</html>
